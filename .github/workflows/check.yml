name: Check

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify (${{ matrix.python-version }})
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            lockfile: requirements-py310.lock
          - python-version: "3.12"
            lockfile: requirements-py312.lock
          - python-version: "3.14"
            lockfile: requirements-py314.lock
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: ${{ matrix.lockfile }}
      - name: Install dependencies
        run: python -m pip install --require-hashes --requirement "${{ matrix.lockfile }}"
      - name: Run repository verification
        run: make check
